<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>omnishot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,500&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrap">
      <h1>omnishot</h1>

      <div class="search-row" id="searchrow">
        <input
          id="q"
          placeholder="Describe the clip you need, visually"
          autocomplete="off"
          autofocus
        />
        <button class="go" id="go" type="button">Find</button>
      </div>
      <div class="querychip" id="querychip">
        <img id="qimg" alt="reference image" />
        <span>searching by image</span>
        <button type="button" id="clear-image">clear</button>
      </div>

      <div class="statusline" id="statusline">
        <span>watching <strong id="s-dir">…</strong></span>
        <span>clips <strong id="s-clips">0</strong></span>
        <span>chunks <strong id="s-chunks">0</strong></span>
        <span id="s-state"></span>
        <span id="s-lat"></span>
      </div>
      <div class="events" id="events"></div>

      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <div>Your footage is searchable now.</div>
        <div class="hint">
          Drop video files into the watch folder, then describe the shot you need.
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
